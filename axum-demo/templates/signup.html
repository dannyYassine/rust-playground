<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign up</title>
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
        <script src="//unpkg.com/alpinejs" defer></script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: #fff;
                color: #111;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .card {
                width: 100%;
                max-width: 480px;
                padding: 2rem 2.5rem;
            }

            .heading {
                font-size: 2rem;
                font-weight: 800;
                letter-spacing: -0.5px;
                margin-bottom: 0.5rem;
            }

            .subheading {
                font-size: 0.95rem;
                color: #6b7280;
                margin-bottom: 2.5rem;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            label {
                font-size: 0.9rem;
                font-weight: 600;
                color: #111;
                display: block;
                margin-bottom: 0.4rem;
            }

            input[type="text"],
            input[type="email"],
            input[type="password"] {
                width: 100%;
                padding: 0.75rem 1rem;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                font-size: 0.95rem;
                color: #111;
                background: #fff;
                outline: none;
                transition: border-color 0.15s;
            }

            input[type="text"]::placeholder,
            input[type="email"]::placeholder,
            input[type="password"]::placeholder {
                color: #9ca3af;
            }

            input[type="text"]:focus,
            input[type="email"]:focus,
            input[type="password"]:focus {
                border-color: #6b7280;
            }

            input.input-error {
                border-color: #f87171;
            }

            .field-error {
                font-size: 0.8rem;
                color: #b91c1c;
                margin-top: 0.35rem;
            }

            .btn-signup {
                width: 100%;
                padding: 0.85rem;
                background-color: #111827;
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition:
                    background-color 0.15s,
                    opacity 0.15s;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }

            .btn-signup:hover {
                background-color: #1f2937;
            }

            .btn-signup:disabled {
                opacity: 0.7;
                cursor: not-allowed;
            }

            .btn-signup .btn-text {
            }

            .btn-signup .btn-loading {
                display: none;
                align-items: center;
                gap: 0.5rem;
            }

            .htmx-request .btn-signup .btn-text {
                display: none;
            }

            .htmx-request .btn-signup .btn-loading {
                display: flex;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .spinner {
                width: 16px;
                height: 16px;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
            }

            .divider {
                text-align: center;
                font-size: 0.8rem;
                color: #9ca3af;
                letter-spacing: 0.08em;
                margin-bottom: 1.25rem;
                text-transform: uppercase;
            }

            .social-buttons {
                display: flex;
                gap: 0.75rem;
                margin-bottom: 2rem;
            }

            .btn-social {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.6rem;
                padding: 0.7rem 1rem;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                background: #fff;
                font-size: 0.9rem;
                font-weight: 600;
                color: #111;
                cursor: pointer;
                text-decoration: none;
                transition:
                    background-color 0.15s,
                    border-color 0.15s;
            }

            .btn-social:hover {
                background-color: #f9fafb;
                border-color: #9ca3af;
            }

            .btn-social svg {
                flex-shrink: 0;
            }

            .signin-row {
                font-size: 0.9rem;
                color: #6b7280;
            }

            .signin-row a {
                color: #3b82f6;
                text-decoration: none;
                font-weight: 500;
            }

            .signin-row a:hover {
                text-decoration: underline;
            }

            .flash {
                display: flex;
                align-items: center;
                gap: 0.6rem;
                padding: 0.75rem 1rem;
                border-radius: 8px;
                font-size: 0.9rem;
                font-weight: 500;
                margin-bottom: 1.25rem;
            }

            .flash-error {
                background-color: #fef2f2;
                color: #b91c1c;
                border: 1px solid #fecaca;
            }

            .flash-success {
                background-color: #f0fdf4;
                color: #15803d;
                border: 1px solid #bbf7d0;
            }

            .flash svg {
                flex-shrink: 0;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1 class="heading">Create an account</h1>
            <p class="subheading">Sign up to get started today.</p>

            <div id="flash-message"></div>

            {{ signup_form() | safe }}

            <div class="divider">or</div>

            <div class="social-buttons">
                <a href="/auth/github" class="btn-social">
                    <svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                        aria-hidden="true"
                    >
                        <path
                            d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.262.82-.582 0-.288-.01-1.05-.015-2.06-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.605-2.665-.303-5.467-1.332-5.467-5.93 0-1.31.468-2.382 1.236-3.222-.124-.303-.536-1.524.117-3.176 0 0 1.008-.322 3.3 1.23a11.5 11.5 0 0 1 3.003-.404c1.02.005 2.047.138 3.003.404 2.29-1.552 3.297-1.23 3.297-1.23.655 1.652.243 2.873.12 3.176.77.84 1.235 1.912 1.235 3.222 0 4.61-2.807 5.624-5.48 5.921.43.372.814 1.102.814 2.222 0 1.606-.015 2.898-.015 3.293 0 .322.216.699.825.58C20.565 21.796 24 17.298 24 12c0-6.63-5.37-12-12-12z"
                        />
                    </svg>
                    GitHub
                </a>

                <a href="/auth/google" class="btn-social">
                    <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        />
                        <path
                            fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        />
                        <path
                            fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        />
                        <path
                            fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        />
                    </svg>
                    Google
                </a>
            </div>

            <p class="signin-row">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </body>
</html>
