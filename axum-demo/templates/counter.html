<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Counter</title>
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
        <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
        <script src="//unpkg.com/alpinejs" defer></script>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"
            type="text/css"
        />
        <script type="module" src="https://unpkg.com/cally"></script>

        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: #fff;
                color: #111;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <div class="card bg-base-200 shadow-xl p-8" x-data="counterForm">
            <div x-data="counterForm" class="flex flex-col items-center gap-6">
                <h1 class="text-4xl font-extrabold tracking-tight">Counter</h1>

                <div class="flex items-center gap-4">
                    <button
                        class="btn btn-primary btn-lg"
                        hx-post="/htmx/counter/add"
                        hx-swap="none"
                        @click="increment"
                    >
                        Increment
                    </button>

                    <div
                        id="counter"
                        class="text-6xl font-bold min-w-20 text-center"
                    >
                        {{ count }}
                    </div>

                    <button
                        class="btn btn-secondary btn-lg"
                        hx-post="/htmx/counter/substract"
                        hx-swap="none"
                        @click="decrement"
                    >
                        Substract
                    </button>
                </div>

                <div
                    x-text="textDisplay"
                    class="text-sm text-base-content/60"
                ></div>

                <div class="divider"></div>

                <div class="flex gap-4">
                    <details class="dropdown" x-ref="dropdown">
                        <summary class="btn btn-outline m-1">
                            open or close
                        </summary>
                        <ul
                            class="menu dropdown-content bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
                        >
                            <li>
                                <a
                                    @click="$refs.dropdown.removeAttribute('open')"
                                    hx-post="/htmx/counter/substract"
                                    hx-swap="none"
                                    >Item 1</a
                                >
                            </li>
                            <li>
                                <a
                                    @click="$refs.dropdown.removeAttribute('open')"
                                    hx-post="/htmx/counter/add"
                                    hx-swap="none"
                                    >Item 2</a
                                >
                            </li>
                        </ul>
                    </details>

                    <button
                        class="btn btn-accent"
                        onclick="my_modal_1.showModal()"
                    >
                        open modal
                    </button>
                    <dialog id="my_modal_1" class="modal">
                        <div class="modal-box">
                            <h3 class="text-lg font-bold">Hello!</h3>
                            <p class="py-4">
                                Press ESC key or click the button below to close
                            </p>
                            <div class="modal-action">
                                <form method="dialog">
                                    <button class="btn">Close</button>
                                </form>
                            </div>
                        </div>
                    </dialog>
                </div>
                {% if true %} {{ calendar_popover() | render }} {% endif %}
            </div>
        </div>
    </body>
</html>
