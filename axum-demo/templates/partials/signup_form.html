<form
    hx-post="/htmx/signup"
    hx-swap="none"
    hx-disabled-elt="find button[type='submit']"
    x-data="signupForm"
    @htmx:after-request="onAfterRequest($event)"
>
    <div class="form-group">
        <label for="name">Full name</label>
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Your full name"
            autocomplete="name"
            x-model="name"
            required
        />
    </div>

    <div class="form-group">
        <label for="email">Email address</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Your email address"
            autocomplete="email"
            x-model="email"
            required
        />
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            autocomplete="new-password"
            x-model="password"
            required
        />
    </div>

    <div class="form-group">
        <label for="confirm_password">Confirm password</label>
        <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Confirm your password"
            autocomplete="new-password"
            x-model="confirmPassword"
            :class="{ 'input-error': confirmPassword && password !== confirmPassword }"
            required
        />
        <p class="field-error" x-show="confirmPassword && password !== confirmPassword">
            Passwords do not match.
        </p>
    </div>

    <button type="submit" class="btn-signup" :disabled="confirmPassword && password !== confirmPassword">
        <span class="btn-text">Create account</span>
        <span class="btn-loading">
            <span class="spinner"></span>
            Creating account...
        </span>
    </button>
</form>
<script>
    document.addEventListener("alpine:init", () => {
        Alpine.data("signupForm", () => ({
            name: "",
            email: "",
            password: "",
            confirmPassword: "",

            onAfterRequest(event) {
                if (event.detail.successful) {
                    this.name = "";
                    this.email = "";
                    this.password = "";
                    this.confirmPassword = "";
                } else {
                    this.password = "";
                    this.confirmPassword = "";
                }
            },
        }));
    });
</script>
