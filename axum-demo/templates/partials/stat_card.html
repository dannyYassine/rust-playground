<div class="stat-card">
    <div class="stat-card-header">
        <div class="stat-icon {{ icon_color }}">
            <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
            >
                {{ icon_svg|safe }}
            </svg>
        </div>
        <span class="stat-dots">···</span>
    </div>
    <div class="stat-label">{{ label }}</div>
    <div class="stat-value">
        {{ value }} <span>/order</span>
    </div>
    <div class="stat-bar">
        <div class="stat-bar-fill" style="width: {{ bar_pct }}%"></div>
    </div>
    <div class="stat-range">
        <span>{{ range_min }}</span><span>{{ range_max }}</span>
    </div>
</div>
