                viewBox="0 0 24 24"

            >
                <circle cx="12" cy="12" r="3" />

                    d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"
                />
            </svg>
        </div>
        <span class="logo-text">START-UP</span>

            viewBox="0 0 24 24"
            fill="none"

            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"

            <rect x="3" y="3" width="7" height="7" />

            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"

            fill="none"

            stroke-width="2"

        <div class="dropdown dropdown-top">
          <div tabindex="0" role="button" class="btn m-1">
              <div class="avatar" style="background: #b0b8c8">
                <svg viewBox="0 0 36 36" fill="#fff" style="width: 100%; height: 100%">
                    <circle cx="18" cy="14" r="7" />
                    <path d="M3 32c0-8.284 6.716-15 15-15s15 6.716 15 15" />
                </svg>
              <div class="avatar-dot"></div>
          </div>
          <div class="user-info">
              <div class="name">{{ user_name }}</div>
              <div class="email">{{ user_email }}</div>
          </div>
          </div>
          <ul tabindex="-1" class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm">
            <li><a>Log out</a></li>
          </ul>
        </div>
